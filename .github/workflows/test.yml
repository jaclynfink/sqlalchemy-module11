name: CI/CD
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/myappdb
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: myappdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Wait for Postgres to be ready
        run: |
          source venv/bin/activate
          python - <<'PY'
          import os
          import time

          import psycopg2

          database_url = os.environ["DATABASE_URL"]
          last_error = None

          for _ in range(30):
              try:
                  conn = psycopg2.connect(database_url)
                  conn.close()
                  print("Postgres is ready")
                  break
              except Exception as exc:  # pragma: no cover
                  last_error = exc
                  print(f"Waiting for Postgres... {exc}")
                  time.sleep(2)
          else:
              raise SystemExit(f"Postgres did not become ready in time: {last_error}")
          PY

      - name: Run tests
        run: |
          source venv/bin/activate
          mkdir -p test-results
          pytest --cov=app --cov-report=term-missing --cov-report=xml --junitxml=test-results/junit.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/junit.xml
            coverage.xml
  security:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build image
        run: docker build -t app:test .
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app:test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
  deploy:
    needs: security
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sqlalchemy-module11:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sqlalchemy-module11:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
